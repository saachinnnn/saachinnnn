<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 30" width="480" height="30">
  <!-- Label -->
  <text x="10" y="20" font-family="'Courier New', monospace" fill="#c9d1d9" font-size="14">HITPOINTS  ::</text>

  <!-- Heart 1 - half full (pulsing via SMIL) -->
  <g transform="translate(155, 5) scale(1.3)">
    <!-- left half filled -->
    <rect x="2" y="0" width="2" height="2" fill="#dd2d4a"/>
    <rect x="4" y="0" width="2" height="2" fill="#dd2d4a"/>
    <rect x="0" y="2" width="2" height="2" fill="#dd2d4a"/>
