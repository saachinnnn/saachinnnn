    <rect x="6" y="10" width="2" height="2" fill="#333"/>
    <rect x="8" y="10" width="2" height="2" fill="#333"/>
    <!-- pulse on the half heart -->
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </g>

