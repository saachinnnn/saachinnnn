    <rect x="4" y="4" width="2" height="2" fill="#dd2d4a"/>
    <rect x="0" y="6" width="2" height="2" fill="#dd2d4a"/>
    <rect x="2" y="6" width="2" height="2" fill="#dd2d4a"/>
    <rect x="4" y="6" width="2" height="2" fill="#dd2d4a"/>
    <rect x="2" y="8" width="2" height="2" fill="#dd2d4a"/>
    <rect x="4" y="8" width="2" height="2" fill="#dd2d4a"/>
    <rect x="4" y="10" width="2" height="2" fill="#dd2d4a"/>
    <!-- right half empty -->
    <rect x="8" y="0" width="2" height="2" fill="#333"/>
    <rect x="10" y="0" width="2" height="2" fill="#333"/>
    <rect x="6" y="2" width="2" height="2" fill="#333"/>
    <rect x="8" y="2" width="2" height="2" fill="#333"/>
    <rect x="10" y="2" width="2" height="2" fill="#333"/>
    <rect x="12" y="2" width="2" height="2" fill="#333"/>
    <rect x="6" y="4" width="2" height="2" fill="#333"/>
    <rect x="8" y="4" width="2" height="2" fill="#333"/>
    <rect x="10" y="4" width="2" height="2" fill="#333"/>
    <rect x="12" y="4" width="2" height="2" fill="#333"/>
    <rect x="6" y="6" width="2" height="2" fill="#333"/>
    <rect x="8" y="6" width="2" height="2" fill="#333"/>
    <rect x="10" y="6" width="2" height="2" fill="#333"/>
    <rect x="12" y="6" width="2" height="2" fill="#333"/>
    <rect x="6" y="8" width="2" height="2" fill="#333"/>
